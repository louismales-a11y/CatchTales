name: Build & Release APK

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44'
          channel: 'stable'

      - name: Get dependencies
        run: flutter pub get

      - name: Build release APK
        run: flutter build apk --release

      - name: Get version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_ENV

      - name: Rename APK
        run: |
          cp build/app/outputs/flutter-apk/app-release.apk \
            build/app/outputs/flutter-apk/BestFishBuddy-v${{ env.VERSION }}.apk

      - name: Create Release & Upload APK
        uses: softprops/action-gh-release@v2
        with:
          name: v${{ env.VERSION }}
          body: |
            BestFishBuddy v${{ env.VERSION }}
            
            Download the APK below to install on your Android device.
          files: build/app/outputs/flutter-apk/BestFishBuddy-v${{ env.VERSION }}.apk
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
